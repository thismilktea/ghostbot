name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'

      - name: Compile core modules
        run: python -m py_compile ghostbot/__init__.py ghostbot/interface.py ghostbot/cli/commands.py ghostbot/agent/loop.py ghostbot/agent/planning.py ghostbot/api/server.py

      - name: Run core tests
        run: python -m pytest tests/agent tests/tools tests/config
